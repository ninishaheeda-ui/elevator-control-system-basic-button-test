<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart Lift Control</title>

<style>

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#808080;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    width:90%;
    max-width:500px;
    padding:30px;
    border-radius:20px;
    text-align:center;
}

h1{
    font-size:40px;
}

h2{
    font-size:30px;
}

button{
    width:100%;
    padding:20px;
    margin:12px 0;
    font-size:28px;
    border:none;
    border-radius:15px;
    background:#e5e5e5;
    cursor:pointer;
}

button:hover{
    background:#d5d5d5;
}

#status{
    font-size:28px;
    font-weight:bold;
    margin-top:20px;
}

.hidden{
    display:none;
}

</style>
</head>

<body>

<div class="container">

<h1>SMART LIFT</h1>

<!-- PAGE 1 -->

<div id="page1">

<h2>Select Current Floor</h2>

<button onclick="selectCurrent(1)">FLOOR 1</button>
<button onclick="selectCurrent(2)">FLOOR 2</button>
<button onclick="selectCurrent(3)">FLOOR 3</button>

</div>

<!-- PAGE 2 -->

<div id="page2" class="hidden">

<h2>Select Destination Floor</h2>

<button onclick="selectDestination(1)">FLOOR 1</button>
<button onclick="selectDestination(2)">FLOOR 2</button>
<button onclick="selectDestination(3)">FLOOR 3</button>

</div>

<p id="status"></p>

</div>

<script>

let currentFloor = 0;

function selectCurrent(floor){

    currentFloor = floor;

    document.getElementById("page1").style.display = "none";

    document.getElementById("page2").classList.remove("hidden");

    document.getElementById("status").innerHTML =
    "🚪 Lift Is Here!";
}

function selectDestination(destinationFloor){

    if(destinationFloor == currentFloor){

        document.getElementById("status").innerHTML =
        "📍 YOU ARE ALREADY HERE";

        return;
    }

    if(destinationFloor > currentFloor){

        document.getElementById("status").innerHTML =
        "⬆ MOVING UP<br>Floor "
        + currentFloor +
        " → Floor " +
        destinationFloor;

    }else{

        document.getElementById("status").innerHTML =
        "⬇ MOVING DOWN<br>Floor "
        + currentFloor +
        " → Floor " +
        destinationFloor;
    }
}

</script>

</body>
</html>
