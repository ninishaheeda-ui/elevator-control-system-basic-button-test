<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart Lift Control</title>

<style>

body{
    background:#808080;
    font-family:Arial, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.container{
    background:white;
    width:90%;
    max-width:500px;
    padding:30px;
    border-radius:20px;
    text-align:center;
}

h1{
    font-size:36px;
}

h2{
    font-size:28px;
}

button{
    width:100%;
    padding:20px;
    margin:10px 0;
    border:none;
    border-radius:15px;
    font-size:24px;
    cursor:pointer;
    background:#e5e5e5;
}

button:hover{
    background:#d0d0d0;
}

#status{
    font-size:26px;
    font-weight:bold;
    margin-top:20px;
}

.hidden{
    display:none;
}

</style>
</head>

<body>

<div class="container">

<h1>SMART LIFT CONTROL</h1>

<!-- STEP 1 -->

<div id="currentSection">

<h2>Select Current Floor</h2>

<button onclick="selectCurrent(1)">FLOOR 1</button>
<button onclick="selectCurrent(2)">FLOOR 2</button>
<button onclick="selectCurrent(3)">FLOOR 3</button>

</div>

<!-- STEP 2 -->

<div id="destinationSection" class="hidden">

<h2>Select Destination Floor</h2>

<button onclick="selectDestination(1)">FLOOR 1</button>
<button onclick="selectDestination(2)">FLOOR 2</button>
<button onclick="selectDestination(3)">FLOOR 3</button>

</div>

<p id="status">
Waiting...
</p>

</div>

<script>

let currentFloor = 0;
let destinationFloor = 0;

function selectCurrent(floor){

    currentFloor = floor;

    document.getElementById("currentSection").classList.add("hidden");

    document.getElementById("destinationSection").classList.remove("hidden");

    document.getElementById("status").innerHTML =
    "🚪 Lift Is Here!<br>Select Destination Floor";

}

function selectDestination(floor){

    destinationFloor = floor;

    if(destinationFloor == currentFloor){

        document.getElementById("status").innerHTML =
        "📍 YOU ARE ALREADY HERE";

        return;
    }

    if(destinationFloor > currentFloor){

        document.getElementById("status").innerHTML =
        "⬆ MOVING UP<br>Floor " +
        currentFloor +
        " → Floor " +
        destinationFloor;

    }else{

        document.getElementById("status").innerHTML =
        "⬇ MOVING DOWN<br>Floor " +
        currentFloor +
        " → Floor " +
        destinationFloor;

    }

}

</script>

</body>
</html>
